name: Package Extension

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(cat manifest.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create ZIP
        run: |
          zip -r udemy-transcript-downloader-v${{ steps.version.outputs.version }}.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "*.md" \
            -x "*.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: udemy-transcript-downloader-v${{ steps.version.outputs.version }}
          path: udemy-transcript-downloader-v${{ steps.version.outputs.version }}.zip
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/heads/master')
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: udemy-transcript-downloader-v${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
